<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPP01-Z Panel Onboarding</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 95vh;
        }
        .card {
            background-color: #2d2d2d;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h1 {
            color: #ff9800;
            font-size: 24px;
            margin-top: 0;
            text-align: center;
        }
        p {
            color: #b0b0b0;
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #ff9800;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #1a1a1a;
            color: #fff;
            font-size: 13px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff9800;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        button {
            width: 100%;
            padding: 13px;
            background-color: #ff9800;
            color: #1a1a1a;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #e68a00;
        }
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Home_Assistant_Logo.svg" alt="Home Assistant" style="width: 80px; height: 80px;">
        </div>
        <h1>🏡 TPP01-Z Panel</h1>
        <p>Skonfiguruj połączenie panelu z serwerem Home Assistant oraz podaj opcjonalny Token GitHub do pobierania aktualizacji OTA.</p>
        
        <form action="/cgi-bin/save_config.sh" method="POST">
            <div class="form-group">
                <label for="ha_url">Adres Home Assistant (URL)</label>
                <input type="text" id="ha_url" name="ha_url" placeholder="np. http://192.168.1.100:8123" required>
            </div>
            
            <div class="form-group">
                <label for="ha_token">Token dostępu (Long-Lived Access Token)</label>
                <textarea id="ha_token" name="ha_token" placeholder="Wklej tutaj długi token wygenerowany w profilu HA..." required></textarea>
            </div>

            <div class="form-group">
                <label for="github_token">Token GitHub (Opcjonalny – do aktualizacji OTA)</label>
                <input type="password" id="github_token" name="github_token" placeholder="Wklej swój GitHub PAT (Personal Access Token)...">
            </div>
            
            <button type="submit">Zapisz i Uruchom panel</button>
        </form>
        
        <div class="footer">
            Powered by OpenCode Native C++ & LVGL v8.3
        </div>
    </div>
</body>
</html>
